<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>London Events Map — All Events</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #map { height: 100%; width: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .legend {
      position: fixed;
      bottom: 24px;
      left: 12px;
      background: rgba(15,15,15,0.92);
      border: 1px solid #333;
      border-radius: 10px;
      padding: 12px 14px;
      z-index: 1000;
      font-size: 0.75rem;
      color: #ddd;
      line-height: 1.8;
      backdrop-filter: blur(4px);
    }
    .legend-title {
      font-weight: 700;
      color: #FF6B35;
      margin-bottom: 6px;
      font-size: 0.8rem;
    }
    .legend-row { display: flex; align-items: center; gap: 8px; }
    .legend-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      border: 1.5px solid rgba(255,255,255,0.3);
      flex-shrink: 0;
    }
    .back-link {
      position: fixed;
      top: 12px;
      left: 12px;
      background: rgba(15,15,15,0.92);
      border: 1px solid #333;
      border-radius: 8px;
      padding: 8px 14px;
      z-index: 1000;
      font-size: 0.8rem;
      color: #FF6B35;
      text-decoration: none;
      backdrop-filter: blur(4px);
    }
    .back-link:hover { color: #ff8c5a; }
    /* Popup styling */
    .leaflet-popup-content-wrapper {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 10px;
      color: #f0f0f0;
      box-shadow: 0 4px 20px rgba(0,0,0,0.6);
    }
    .leaflet-popup-tip { background: #1a1a1a; }
    .leaflet-popup-content { margin: 14px 16px; font-size: 0.82rem; line-height: 1.5; }
    .leaflet-popup-content b { font-size: 0.9rem; color: #fff; }
    .leaflet-popup-content i { color: #FF6B35; font-style: normal; font-weight: 600; }
    .leaflet-popup-content a { color: #FF6B35; }
    .leaflet-popup-close-button { color: #aaa !important; }
  </style>
</head>
<body>
  <a class="back-link" href="../">← All resources</a>
  <div id="map"></div>
  <div class="legend">
    <div class="legend-title">🗺️ This week's full list</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ff9800"></div> Arts &amp; Culture</div>
    <div class="legend-row"><div class="legend-dot" style="background:#9c27b0"></div> Music &amp; Nightlife</div>
    <div class="legend-row"><div class="legend-dot" style="background:#4a90d9"></div> Comedy &amp; Theatre</div>
    <div class="legend-row"><div class="legend-dot" style="background:#f44336"></div> Food &amp; Drink</div>
    <div class="legend-row"><div class="legend-dot" style="background:#4caf50"></div> Family</div>
    <div class="legend-row"><div class="legend-dot" style="background:#00bcd4"></div> Sport &amp; Wellness</div>
    <div class="legend-row"><div class="legend-dot" style="background:#ffc107"></div> Other</div>
  </div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-omnivore@0.3.4/leaflet-omnivore.min.js"></script>
  <script>
    var map = L.map('map', { zoomControl: true }).setView([51.505, -0.09], 12);

    L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
      attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> &copy; <a href="https://carto.com/">CARTO</a>',
      maxZoom: 19
    }).addTo(map);

    var COLOURS = {
      'blue-dot.png':   '#4a90d9',
      'green-dot.png':  '#4caf50',
      'ltblue-dot.png': '#00bcd4',
      'orange-dot.png': '#ff9800',
      'purple-dot.png': '#9c27b0',
      'red-dot.png':    '#f44336',
      'yellow-dot.png': '#ffc107',
    };

    var customLayer = L.geoJson(null, {
      pointToLayer: function(feature, latlng) {
        var styleUrl = (feature.properties.styleUrl || '').replace('#', '');
        var colour = COLOURS[styleUrl] || '#ffc107';
        return L.circleMarker(latlng, {
          radius: 9,
          fillColor: colour,
          color: 'rgba(255,255,255,0.4)',
          weight: 1.5,
          opacity: 1,
          fillOpacity: 0.9
        });
      },
      onEachFeature: function(feature, layer) {
        var desc = feature.properties.description || feature.properties.name || '';
        layer.bindPopup(desc, { maxWidth: 280, maxHeight: 300 });
      }
    });

    omnivore.kml('all_events.kml', null, customLayer).addTo(map);

    customLayer.on('ready', function() {
      if (customLayer.getLayers().length > 0) {
        try { map.fitBounds(customLayer.getBounds(), { padding: [40, 40] }); }
        catch(e) {}
      }
    });
  </script>
</body>
</html>
